<!DOCTYPE html>
<html lang="it">
<head>

<div class="container">

  <img src="comingsoon.png" alt="DrinkWise">

  <div
    style="
      position:absolute;
      top:65.7%;
      left:50%;
      transform:translate(-50%,-50%);
      width:120px;
      height:88px;
      background:#07111f;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
    "
  >
    <span
      style="
        font-size:72px;
        font-weight:700;
        color:#d4af37;
        font-family:Georgia, serif;
        line-height:1;

      23
